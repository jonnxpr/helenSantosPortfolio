name: Preflight Enforcement

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-preflight-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR preflight evidence
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request && context.payload.pull_request.body) || "";
            const regex = /Preflight OK:\s*.+/i;
            if (!regex.test(body)) {
              core.setFailed("PR body must include preflight evidence line: 'Preflight OK: <file1>, <file2>, ...'");
            }
